<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Mood Atlas">
  <title>Mood Atlas</title>
  <desc>Five staggered tiles forming an editorial mood-board composition. One tile is warm vermillion, the rest are ink blue.</desc>

  <!-- Top row -->
  <rect x="20" y="32" width="28" height="28" fill="#1E2A38"/>
  <rect x="52" y="36" width="24" height="24" fill="#D14F2F"/>
  <rect x="80" y="32" width="22" height="32" fill="#1E2A38"/>

  <!-- Bottom row -->
  <rect x="20" y="68" width="36" height="18" fill="#1E2A38"/>
  <rect x="60" y="72" width="42" height="20" fill="#1E2A38"/>
</svg>
